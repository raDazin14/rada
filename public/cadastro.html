<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CorreJá - Criar conta</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="icon" href="logo.svg" type="image/svg+xml">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#D6486F">

<link rel="apple-touch-icon" href="/icons/icon-maskable-512.png">

<link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

<div class="login-card">

    <img src="logo.svg" alt="CorreJá" class="logo-marca">

    <h1>CorreJá</h1>

    <p>Crie sua conta e comece a correr.</p>

    <input
        id="nome"
        type="text"
        placeholder="Seu nome">

    <input
        id="email"
        type="email"
        placeholder="Seu e-mail">

    <input
        id="senha"
        type="password"
        placeholder="Crie uma senha">

    <input
        id="confirmar"
        type="password"
        placeholder="Confirme a senha">

    <button onclick="cadastrar()">

        Criar conta

    </button>

    <a href="login.html">

        Já tenho conta

    </a>

</div>

<script src="config.js"></script>
<script src="auth.js"></script>

<script src="pwa.js"></script>

</body>
</html>
